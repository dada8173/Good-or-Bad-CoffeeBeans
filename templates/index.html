<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cofe_log | 專業級咖啡豆 AI 分類器</title>
    <!-- 引入 Outfit 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <!-- 背景裝飾 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="dashboard-wrapper">
      <header class="main-header">
        <div class="logo">
          <span class="icon">☕</span>
          <h1>Cofe_log</h1>
          <span class="badge">Professional</span>
        </div>
        <div class="status-indicators">
          <div class="indicator" id="system-status">
            <span class="dot active"></span> 系統在線
          </div>
          <div class="indicator" id="camera-status">
            <span class="dot"></span> 相機未啟用
          </div>
        </div>
      </header>

      <main class="dashboard-grid">
        <!-- 左側：視覺監測與操作區域 -->
        <section class="panel glass-panel" id="visual-panel">
          <div class="panel-header">
            <h2>視覺監測視窗</h2>
            <div class="panel-actions">
              <button id="fullscreen-btn" class="fullscreen-btn" title="全螢幕">
                <span class="icon">⛶</span>
              </button>
              <button id="camera-toggle-btn" class="btn btn-secondary">開啟相機</button>
              <button id="mode-toggle-btn" class="btn btn-outline">即時偵測：關</button>
            </div>
          </div>
          
          <div class="visual-viewport">
            <video id="webcam-view" autoplay playsinline muted hidden></video>
            <div id="visual-placeholder" class="placeholder">
              <div class="placeholder-content">
                <span class="icon">📷</span>
                <p>啟動相機開始即時分類</p>
              </div>
            </div>
            <img id="static-preview" class="preview-img" hidden />
            
            <!-- 偵測覆蓋層 -->
            <div id="detection-overlay" class="overlay" hidden>
              <div class="scanning-bar"></div>
              <div class="scanning-grid"></div>
              <div class="detection-box"></div>
            </div>
          </div>

          <div class="panel-footer">
            <div class="gallery-tabs">
              <button class="tab-btn active" data-target="upload-area">自定義照片</button>
              <button class="tab-btn" data-target="example-area">範例照片庫</button>
            </div>

            <div id="upload-area" class="tab-content active">
              <div class="upload-control">
                <label for="image-input" class="btn btn-primary">
                  <span class="icon">📤</span> 上傳靜態照片
                </label>
                <input id="image-input" type="file" name="image" accept="image/*" hidden />
              </div>
              <p class="hint">支援格式: JPG, PNG, WEBP (Max 10MB)</p>
            </div>

            <div id="example-area" class="tab-content">
              <div class="example-grid">
                <div class="example-group">
                  <span class="group-label success">優質豆 (Good)</span>
                  <div class="thumbnails">
                    <img src="/static/assets/examples/good/good1.jpg" class="example-thumb" data-label="good" />
                    <img src="/static/assets/examples/good/good2.jpg" class="example-thumb" data-label="good" />
                    <img src="/static/assets/examples/good/good3.jpg" class="example-thumb" data-label="good" />
                  </div>
                </div>
                <div class="example-group">
                  <span class="group-label danger">瑕疵豆 (Bad)</span>
                  <div class="thumbnails">
                    <img src="/static/assets/examples/bad/bad1.jpg" class="example-thumb" data-label="bad" />
                    <img src="/static/assets/examples/bad/bad2.jpg" class="example-thumb" data-label="bad" />
                    <img src="/static/assets/examples/bad/bad3.jpg" class="example-thumb" data-label="bad" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- 右側：分析數據與設定 -->
        <aside class="sidebar">
          <!-- 模型選擇卡片 -->
          <div class="panel glass-panel" id="config-panel">
            <h3>分類模型設定</h3>
            <div class="field">
              <label for="model-select">核心推理引擎</label>
              <select id="model-select" class="custom-select">
                <option value="" disabled selected>請選擇分析模型...</option>
                {% for model in models %}
                <option value="{{ model.key }}">{{ model.display_name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- 即時分析結果卡片 -->
          <div class="panel glass-panel" id="result-panel">
            <div class="panel-header">
              <h3>智能分析數據</h3>
              <div id="last-update" class="timestamp">--:--:--</div>
            </div>

            <div class="result-display">
              <div class="main-prediction">
                <span class="label-heading">主要預測結果</span>
                <div id="result-label" class="prediction-value">Waiting...</div>
              </div>

              <div class="confidence-section">
                <span class="label-heading" data-tooltip="AI 對此預測結果的確定程度">信賴區間 ⓘ</span>
                <div id="probability-container" class="prob-bars">
                  <!-- JS 動態插入 -->
                </div>
              </div>
            </div>
          </div>

          <!-- 模型統計卡片 -->
          <div class="panel glass-panel mini">
            <h3 data-tooltip="顯示當前模型採用的人工智慧運算架構">深度學習架構 ⓘ</h3>
            <div class="info-row">
              <span class="attr">部署架構</span>
              <span id="info-arch" class="val">-</span>
            </div>
            <div class="info-row">
              <span class="attr">輸入維度</span>
              <span id="info-size" class="val">-</span>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <!-- 隱藏畫布用於截幀 -->
    <canvas id="frame-capture" width="640" height="640" style="display: none;"></canvas>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
